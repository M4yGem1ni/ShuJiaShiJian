name: CI Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ---------- Backend ----------
      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Build backend (TypeScript)
        run: cd backend && npm run build

      # ---------- Frontend ----------
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (Vite)
        run: cd frontend && npm run build

      # ---------- Prepare Release ----------
      - name: Copy frontend build into backend
        run: |
          mkdir -p backend/public
          cp -r frontend/dist/* backend/public/

      - name: Initialize database & seed demo data
        run: |
          cd backend
          cp .env.example .env
          npx prisma db push
          node --import tsx prisma/seed.ts

      - name: Assemble release package
        run: |
          RELEASE_DIR="shujiashijian-release"
          mkdir -p "$RELEASE_DIR"

          cp -r backend/dist "$RELEASE_DIR/server"
          cp -r backend/public "$RELEASE_DIR/public"
          cp -r backend/prisma "$RELEASE_DIR/prisma"
          cp -r backend/node_modules "$RELEASE_DIR/node_modules"
          cp backend/package.json "$RELEASE_DIR/"
          cp backend/.env.example "$RELEASE_DIR/.env"
          cp README.md "$RELEASE_DIR/" 2>/dev/null || true

          # Create start.sh (avoid YAML flow mapping conflict with { })
          printf '\043!/usr/bin/env bash\n' > "$RELEASE_DIR/start.sh"
          printf 'set -e\n' >> "$RELEASE_DIR/start.sh"
          printf 'cd "$(dirname "$0")"\n' >> "$RELEASE_DIR/start.sh"
          printf 'echo "============================================"\n' >> "$RELEASE_DIR/start.sh"
          printf 'echo "  ZheJiang Digital Charity Platform"\n' >> "$RELEASE_DIR/start.sh"
          printf 'echo "============================================"\n' >> "$RELEASE_DIR/start.sh"
          printf 'if [ ! -f .env ]; then\n' >> "$RELEASE_DIR/start.sh"
          printf '  cp .env.example .env\n' >> "$RELEASE_DIR/start.sh"
          printf 'fi\n' >> "$RELEASE_DIR/start.sh"
          printf 'echo "Starting server..."\n' >> "$RELEASE_DIR/start.sh"
          printf 'NODE_ENV=production node server/app.js\n' >> "$RELEASE_DIR/start.sh"

          chmod +x "$RELEASE_DIR/start.sh"

          tar -czf shujiashijian-release.tar.gz "$RELEASE_DIR/"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: shujiashijian-release
          path: shujiashijian-release.tar.gz
          retention-days: 30

# CI Build & Release Pipeline
# 1) build      - validates the project compiles (every push/PR)
# 2) package    - builds standalone executables via pkg (push to main only)
# 3) release    - publishes all artifacts to GitHub Releases (push to main only)

name: "CI Build & Release"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Step 1: Verify the project builds correctly
  # ----------------------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend
      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Build backend (TypeScript)
        run: cd backend && npm run build

      # Frontend
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (Vite)
        run: cd frontend && npm run build

      # Copy frontend into backend for static serving
      - name: Copy frontend build into backend
        shell: bash
        run: |
          mkdir -p backend/public
          cp -r frontend/dist/* backend/public/

  # ----------------------------------------------------------------
  # Step 2: Build standalone executables via pkg (main branch only)
  # ----------------------------------------------------------------
  package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
            pkg-target: node22-linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            pkg-target: node22-linux-arm64
          - runner: windows-latest
            target: win-x64
            pkg-target: node22-win-x64
          - runner: macos-latest
            target: darwin-arm64
            pkg-target: node22-darwin-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend deps first
      - name: Install backend dependencies
        run: cd backend && npm ci

      # Frontend deps & build
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (Vite)
        run: cd frontend && npm run build

      # Copy frontend dist into backend/public
      - name: Copy frontend build into backend
        shell: bash
        run: |
          mkdir -p backend/public
          cp -r frontend/dist/* backend/public/

      # Prepare database (push schema + seed data) — creates prisma/dev.db
      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Push database schema & seed
        run: |
          cd backend
          npx prisma db push
          npx tsx prisma/seed.ts

      # Dump SQL schema for auto-initialization fallback
      - name: Dump SQL schema
        shell: bash
        run: |
          cd backend
          if command -v sqlite3 &> /dev/null; then
            sqlite3 prisma/dev.db .schema > prisma/schema.sql
            echo "SQL schema dumped to prisma/schema.sql"
          else
            echo "sqlite3 not available, embedding schema dump will be skipped"
          fi

      # Copy dev.db to backend root (embed-assets.js searches both locations)
      - name: Copy database for embedding
        run: cp backend/prisma/dev.db backend/dev.db

      # Run embed-assets.js to generate static-assets.ts with all assets + db embedded
      - name: Embed assets into generated/static-assets.ts
        run: cd backend && node scripts/embed-assets.js

      # Build backend TypeScript (compiles the freshly generated static-assets.ts)
      - name: Build backend (TypeScript)
        run: cd backend && npm run build

      # Package executable with pkg
      - name: Build standalone executable
        shell: bash
        run: |
          cd backend
          node node_modules/@yao-pkg/pkg/lib-es5/bin.js dist/app.js --target ${{ matrix.pkg-target }} --output ../shujiashijian-${{ matrix.target }}

      # Upload executable as CI artifact
      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: executable-${{ matrix.target }}
          path: shujiashijian-*
          retention-days: 30

  # ----------------------------------------------------------------
  # Step 3: Publish GitHub Release (main branch only)
  # ----------------------------------------------------------------
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Download all executables
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## 浙江数字公益扶贫平台 - 自动构建

            ### 构建信息
            - Commit: ${{ github.sha }}
            - Build: ${{ github.run_number }}
            - Date: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

            ### 下载说明
            - **shujiashijian-linux-x64**: Linux x86_64 可执行文件
            - **shujiashijian-linux-arm64**: Linux ARM64 可执行文件
            - **shujiashijian-win-x64.exe**: Windows x86_64 可执行文件
            - **shujiashijian-darwin-arm64**: macOS Apple Silicon 可执行文件

            ### 运行方式
            - **Linux/macOS**: `chmod +x shujiashijian-* && ./shujiashijian-*`
            - **Windows**: 直接运行 `shujiashijian-win-x64.exe`
            - 浏览器打开 http://localhost:3001
          files: release-artifacts/**/shujiashijian-*
          generate_release_notes: false
          fail_on_unmatched_files: false
